<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title> AI Accountability </title>
  <meta name="description" content="Using canva2d">
  <meta name="author" content="Marilyn Ma">

  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/bubble_chart.css">
  
</head>
<body>
  <div class="container">
    <div>. </div>
    <h1> AI Accountability </h1>
    <div class="scene-controls">       
      <span class="scene-hint">PRESS TO CONTINUE</span>                                                                              
      <div class="scene-arrows">                            
        <button id="scene-prev" class="scene-arrow" aria-label="Previous scene">◀</button>
        <button id="scene-next" class="scene-arrow" aria-label="Next scene">▶</button>                           
      </div>                                                                                                                                                 
    </div>   
    <canvas id="vis"></canvas>
    <div id="legend" hidden></div>
    <div id="scene-stepper">
      <h2 id="scene-title" class="scene-title"></h2>
      <p id="scene-body" class="scene-body"></p>
    </div>
    <div id="tooltip" style="
        position: absolute;
        display: none;
        background: white;
        border: 2px solid #000;
        border-radius: 5px;
        padding: 10px;
        font-size: 12px;
        pointer-events: none;
        width: 240px;
        z-index: 10;
    "></div>
  </div>
  

  <script type="module" src="src/main.js"></script>
</body>
</html>
