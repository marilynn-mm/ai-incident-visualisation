<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bubble Chart Replica</title>
  <meta name="description" content="Using canva2d">
  <meta name="author" content="Marilyn Ma">

  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/bubble_chart.css">
  
</head>
<body>
  <div class="container">
    <h1> AIAAIC Accountability </h1>
    <!-- Toolbar hidden: navigation is now the ◀ ▶ scene stepper below the
         canvas. Kept in markup for now in case it returns as a chapter
         jumper; see PROJECT.md. -->
    <div id="toolbar" hidden >
      <a href="#" id="all" class="button active">All Incidents</a>
      <a href="#" id="timeline" class="button">Timeline by Harm</a>
      <a href="#" id="split" class="button">Accountability Gap</a>
    </div>
    <canvas id="vis"></canvas>
    <div id="legend" hidden></div>
    <div id="scene-stepper">
      <div class="scene-controls">
        <button id="scene-prev" class="scene-arrow" aria-label="Previous scene">◀</button>
        <span id="scene-indicator" class="scene-indicator"></span>
        <button id="scene-next" class="scene-arrow" aria-label="Next scene">▶</button>
      </div>
      <h2 id="scene-title" class="scene-title"></h2>
      <p id="scene-body" class="scene-body"></p>
    </div>
    <div id="tooltip" style="
        position: absolute;
        display: none;
        background: white;
        border: 2px solid #000;
        border-radius: 5px;
        padding: 10px;
        font-size: 12px;
        pointer-events: none;
        width: 240px;
        z-index: 10;
    "></div>
  </div>
  

  <script type="module" src="src/main.js"></script>
</body>
</html>
